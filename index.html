<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametri Bagno</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 480px;
            width: 90%;
            margin: 20px 0;
        }

        h1 { margin-top: 0; font-weight: 800; color: #2d3748; font-size: 1.8rem; }
        p { color: #718096; margin-bottom: 1.5rem; font-size: 0.95rem; }
        
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: #4a5568; }
        
        input {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0;
            border-radius: 10px; font-size: 1rem; font-family: 'Poppins', sans-serif;
            box-sizing: border-box; transition: border-color 0.3s ease;
        }
        input:focus { outline: none; border-color: #667eea; }

        .btn-main {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 15px; border: none; border-radius: 10px;
            width: 100%; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: 'Poppins', sans-serif;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3); }

        .gps-row { display: flex; gap: 10px; }
        .btn-gps {
            background: #e2e8f0; border: none; border-radius: 10px;
            padding: 0 15px; font-size: 1.5rem; cursor: pointer;
            transition: background 0.3s;
        }
        .btn-gps:hover { background: #cbd5e0; }

        #gps-status { color: #718096; display: block; margin-top: 5px; font-size: 0.8rem; }
        
        #risultato-container { 
            margin-top: 2rem; 
            padding-top: 1.5rem; 
            border-top: 2px dashed #e2e8f0; 
            display: none; 
            text-align: left;
        }

        ul.lista-dettagli { list-style-type: none; padding: 0; margin: 0 0 1.5rem 0; }
        ul.lista-dettagli li {
            background: #f7fafc; margin-bottom: 8px; padding: 10px 15px;
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
            font-size: 0.9rem; color: #4a5568; border: 1px solid #e2e8f0;
        }

        .dettaglio-testo { flex-grow: 1; }
        .esito-pari { color: #48bb78; font-weight: 600; font-size: 0.8rem; margin-left: 5px; }
        .esito-dispari { color: #a0aec0; font-weight: 600; font-size: 0.8rem; margin-left: 5px; }
        .punti-badge { font-weight: bold; font-size: 1.1rem; min-width: 30px; text-align: right; }
        
        .positivo { color: #48bb78; } 
        .neutro { color: #a0aec0; } 

        .punteggio { font-size: 1.2rem; font-weight: 800; color: #2d3748; margin-bottom: 0.5rem; text-align: center; }
        .messaggio { font-size: 1.4rem; font-weight: 800; text-align: center; margin-top: 10px; }
        .motivo-extra { font-size: 0.9rem; font-weight: normal; display: block; margin-top: 5px; }
        
        .success { color: #48bb78; }
        .error { color: #e53e3e; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Parametri Bagno 🚽</h1>
        <p>Regole: Pari = +1, Dispari = 0.</p>

        <div class="input-group">
            <label for="temperatura">Temperatura attuale (°C):</label>
            <div class="gps-row">
                <input type="number" id="temperatura" placeholder="Es. 22" required>
                <button type="button" class="btn-gps" onclick="ottieniTemperaturaGPS()" title="Usa la tua posizione per la temperatura">📍</button>
            </div>
            <small id="gps-status"></small>
        </div>

        <button class="btn-main" onclick="calcolaPermesso()">Verifica Permesso</button>

        <div id="risultato-container">
            <ul id="lista-parametri" class="lista-dettagli"></ul>
            <div id="testo-punteggio" class="punteggio"></div>
            <div id="testo-messaggio" class="messaggio"></div>
        </div>
    </div>

    <script>
        const API_KEY = 'fb8cb7f2f9da78c694454180a6723926'; 

        function ottieniTemperaturaGPS() {
            const statusText = document.getElementById('gps-status');
            const tempInput = document.getElementById('temperatura');

            if (!navigator.geolocation) {
                statusText.innerText = "❌ GPS non supportato dal browser.";
                return;
            }

            statusText.innerText = "⏳ Ricerca posizione in corso... accetta il permesso!";

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    statusText.innerText = "✅ Posizione trovata! Calcolo meteo...";

                    try {
                        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
                        
                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(`Errore Server: ${errorData.message}`);
                        }
                        
                        const data = await response.json();
                        const tempReale = Math.round(data.main.temp);
                        
                        tempInput.value = tempReale;
                        statusText.innerText = `📍 Posizione: ${data.name}. Dati aggiornati!`;
                    } catch (error) {
                        statusText.innerText = `❌ ${error.message}`;
                        console.error(error);
                    }
                },
                (error) => {
                    statusText.innerText = `❌ Errore GPS: ${error.message}`;
                }
            );
        }

        // Funzione per controllare se è pari
        function isPari(numero) {
            return numero % 2 === 0;
        }

        // Genera la riga per l'elenco (Pari = +1, Dispari = 0)
        function generaRigaLista(nomeParametro, valore) {
            const pari = isPari(valore);
            const punti = pari ? "+1" : "0";
            const classeEsito = pari ? "esito-pari" : "esito-dispari";
            const testoEsito = pari ? "(Pari)" : "(Dispari)";
            const classePunti = pari ? "positivo" : "neutro";

            return `
                <li>
                    <div class="dettaglio-testo">
                        ${nomeParametro}: <strong>${valore}</strong> <span class="${classeEsito}">${testoEsito}</span>
                    </div>
                    <div class="punti-badge ${classePunti}">${punti}</div>
                </li>
            `;
        }

        function calcolaPermesso() {
            const inputTemperatura = document.getElementById('temperatura').value;

            if (inputTemperatura === "") {
                alert("Per favore, usa il GPS o inserisci la temperatura a mano!");
                return;
            }

            const temperatura = parseInt(inputTemperatura);
            let punteggioTotale = 0;
            let htmlLista = ""; 

            const dataAttuale = new Date();
            const giorniSettimanaNomi = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];

            // 1. Ora
            const ora = dataAttuale.getHours();
            htmlLista += generaRigaLista(`Ora`, ora);
            punteggioTotale += isPari(ora) ? 1 : 0;

            // 2. Giorno della settimana (Lunedì = 1 ... Domenica = 7)
            let giornoJS = dataAttuale.getDay();
            let giornoNumero = giornoJS === 0 ? 7 : giornoJS; 
            htmlLista += generaRigaLista(`Giorno (${giorniSettimanaNomi[giornoJS]})`, giornoNumero);
            punteggioTotale += isPari(giornoNumero) ? 1 : 0;

            // 3. Giorno del mese
            const giornoMese = dataAttuale.getDate();
            htmlLista += generaRigaLista(`Giorno del mese`, giornoMese);
            punteggioTotale += isPari(giornoMese) ? 1 : 0;

            // 4. Numero del mese
            const mese = dataAttuale.getMonth() + 1;
            htmlLista += generaRigaLista(`Mese dell'anno`, mese);
            punteggioTotale += isPari(mese) ? 1 : 0;

            // 5. Temperatura
            htmlLista += generaRigaLista(`Temperatura`, temperatura);
            punteggioTotale += isPari(temperatura) ? 1 : 0;

            // Stampa a schermo
            const container = document.getElementById('risultato-container');
            const listaParametri = document.getElementById('lista-parametri');
            const testoPunteggio = document.getElementById('testo-punteggio');
            const testoMessaggio = document.getElementById('testo-messaggio');

            listaParametri.innerHTML = htmlLista;
            testoPunteggio.innerHTML = `Punteggio totale: <strong>${punteggioTotale}</strong>`;

            // REGOLA FINALE: Totale Pari = OK, Totale Dispari = NO
            if (punteggioTotale % 2 === 0) {
                testoMessaggio.innerHTML = "PUOI ANDARE IN BAGNO! 🎉<br><span class='motivo-extra'>(Il punteggio totale è PARI)</span>";
                testoMessaggio.className = "messaggio success";
            } else {
                testoMessaggio.innerHTML = "NON PUOI ANDARE IN BAGNO. 🛑<br><span class='motivo-extra'>(Il punteggio totale è DISPARI)</span>";
                testoMessaggio.className = "messaggio error";
            }

            container.style.display = 'block';
        }
    </script>

</body>
</html>
