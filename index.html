<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametri Bagno</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            margin: 20px 0;
        }

        h1 { margin-top: 0; font-weight: 800; color: #2d3748; font-size: 1.8rem; }
        p { color: #718096; margin-bottom: 1.5rem; font-size: 0.95rem; }
        
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: #4a5568; }
        
        input {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0;
            border-radius: 10px; font-size: 1rem; font-family: 'Poppins', sans-serif;
            box-sizing: border-box; transition: border-color 0.3s ease;
        }
        input:focus { outline: none; border-color: #667eea; }

        .btn-main {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 15px; border: none; border-radius: 10px;
            width: 100%; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: 'Poppins', sans-serif;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3); }

        .gps-row { display: flex; gap: 10px; }
        .btn-gps {
            background: #e2e8f0; border: none; border-radius: 10px;
            padding: 0 15px; font-size: 1.5rem; cursor: pointer;
            transition: background 0.3s;
        }
        .btn-gps:hover { background: #cbd5e0; }

        #gps-status { color: #718096; display: block; margin-top: 5px; font-size: 0.8rem; }
        
        #risultato-container { 
            margin-top: 2rem; 
            padding-top: 1.5rem; 
            border-top: 2px dashed #e2e8f0; 
            display: none; 
            text-align: left; /* Allineato a sinistra per la lista */
        }

        /* Stile per la lista dei parametri */
        ul.lista-dettagli {
            list-style-type: none;
            padding: 0;
            margin: 0 0 1.5rem 0;
        }

        ul.lista-dettagli li {
            background: #f7fafc;
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }

        .punti-positivi { color: #48bb78; font-weight: bold; }
        .punti-negativi { color: #e53e3e; font-weight: bold; }

        .punteggio { font-size: 1.2rem; font-weight: 800; color: #2d3748; margin-bottom: 0.5rem; text-align: center; }
        .messaggio { font-size: 1.4rem; font-weight: 800; text-align: center; }
        .success { color: #48bb78; }
        .error { color: #e53e3e; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Parametri Bagno 🚽</h1>
        <p>Il severissimo algoritmo che decide se puoi andare in bagno.</p>

        <div class="input-group">
            <label for="indumenti">Numero di indumenti indossati:</label>
            <input type="number" id="indumenti" placeholder="Es. 4" min="0" required>
        </div>

        <div class="input-group">
            <label for="temperatura">Temperatura attuale (°C):</label>
            <div class="gps-row">
                <input type="number" id="temperatura" placeholder="Es. 22" required>
                <button type="button" class="btn-gps" onclick="ottieniTemperaturaGPS()" title="Usa la tua posizione per la temperatura">📍</button>
            </div>
            <small id="gps-status"></small>
        </div>

        <button class="btn-main" onclick="calcolaPermesso()">Verifica Permesso</button>

        <div id="risultato-container">
            <ul id="lista-parametri" class="lista-dettagli"></ul>
            
            <div id="testo-punteggio" class="punteggio"></div>
            <div id="testo-messaggio" class="messaggio"></div>
        </div>
    </div>

    <script>
        const API_KEY = 'INSERISCI_QUI_LA_TUA_API_KEY'; // Ricordati di rimettere la tua chiave API qui!

        function ottieniTemperaturaGPS() {
            const statusText = document.getElementById('gps-status');
            const tempInput = document.getElementById('temperatura');

            if (!navigator.geolocation) {
                statusText.innerText = "❌ GPS non supportato dal browser.";
                return;
            }

            statusText.innerText = "⏳ Ricerca posizione in corso... accetta il permesso!";

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    statusText.innerText = "✅ Posizione trovata! Calcolo meteo...";

                    try {
                        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
                        
                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(`Errore Server: ${errorData.message}`);
                        }
                        
                        const data = await response.json();
                        const tempReale = Math.round(data.main.temp);
                        
                        tempInput.value = tempReale;
                        statusText.innerText = `📍 Posizione: ${data.name}. Dati aggiornati!`;
                    } catch (error) {
                        statusText.innerText = `❌ ${error.message}`;
                        console.error(error);
                    }
                },
                (error) => {
                    statusText.innerText = `❌ Errore GPS: ${error.message}`;
                }
            );
        }

        // Funzione di utilità per formattare il punteggio nella lista (+1 o -1)
        function formattaPunti(punti) {
            if (punti > 0) return `<span class="punti-positivi">+1</span>`;
            return `<span class="punti-negativi">-1</span>`;
        }

        function calcolaPermesso() {
            const inputIndumenti = document.getElementById('indumenti').value;
            const inputTemperatura = document.getElementById('temperatura').value;

            if (inputIndumenti === "" || inputTemperatura === "") {
                alert("Per favore, compila tutti i campi o usa il GPS per la temperatura!");
                return;
            }

            const indumenti = parseInt(inputIndumenti);
            const temperatura = parseInt(inputTemperatura);
            let punteggioTotale = 0;
            let htmlLista = ""; // Variabile che conterrà la lista da stampare

            const dataAttuale = new Date();
            const giorniSettimanaNomi = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];

            // 1. Ora pari/dispari
            const ora = dataAttuale.getHours();
            const puntiOra = (ora % 2 === 0) ? 1 : -1;
            punteggioTotale += puntiOra;
            htmlLista += `<li>Ora (${ora}:00): <span>${formattaPunti(puntiOra)}</span></li>`;

            // 2. Giorno della settimana
            const giornoSettimana = dataAttuale.getDay();
            const puntiSettimana = (giornoSettimana >= 1 && giornoSettimana <= 5) ? 1 : -1;
            punteggioTotale += puntiSettimana;
            htmlLista += `<li>Giorno (${giorniSettimanaNomi[giornoSettimana]}): <span>${formattaPunti(puntiSettimana)}</span></li>`;

            // 3. Giorno del mese
            const giornoMese = dataAttuale.getDate();
            const puntiGiornoMese = (giornoMese % 2 === 0) ? 1 : -1;
            punteggioTotale += puntiGiornoMese;
            htmlLista += `<li>Giorno del mese (${giornoMese}): <span>${formattaPunti(puntiGiornoMese)}</span></li>`;

            // 4. Numero del mese
            const mese = dataAttuale.getMonth() + 1;
            const puntiMese = (mese % 2 === 0) ? 1 : -1;
            punteggioTotale += puntiMese;
            htmlLista += `<li>Numero del mese (${mese}): <span>${formattaPunti(puntiMese)}</span></li>`;

            // 5. Temperatura (> 20)
            const puntiTemp = (temperatura > 20) ? 1 : -1;
            punteggioTotale += puntiTemp;
            htmlLista += `<li>Temperatura (${temperatura}°C): <span>${formattaPunti(puntiTemp)}</span></li>`;

            // 6. Indumenti (Pari o Dispari)
            const puntiIndumenti = (indumenti % 2 === 0) ? 1 : -1;
            punteggioTotale += puntiIndumenti;
            htmlLista += `<li>Indumenti (${indumenti}): <span>${formattaPunti(puntiIndumenti)}</span></li>`;

            // Mostra tutto nella pagina
            const container = document.getElementById('risultato-container');
            const listaParametri = document.getElementById('lista-parametri');
            const testoPunteggio = document.getElementById('testo-punteggio');
            const testoMessaggio = document.getElementById('testo-messaggio');

            // Inserisci la lista
            listaParametri.innerHTML = htmlLista;

            // Inserisci il punteggio
            testoPunteggio.innerText = `Punteggio totale: ${punteggioTotale}`;

            // Inserisci il messaggio finale
            if (punteggioTotale > 1) {
                testoMessaggio.innerText = "PUOI ANDARE IN BAGNO! 🎉";
                testoMessaggio.className = "messaggio success";
            } else {
                testoMessaggio.innerText = "NON PUOI ANDARE IN BAGNO. 🛑";
                testoMessaggio.className = "messaggio error";
            }

            // Rendi visibile il contenitore
            container.style.display = 'block';
        }
    </script>

</body>
</html>
